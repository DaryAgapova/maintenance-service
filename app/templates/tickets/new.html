{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
<div class="col-md-7">
  <div class="card">
    <div class="card-header"><h5 class="mb-0">Новая заявка</h5></div>
    <div class="card-body">
      <form method="post" action="/tickets/new">
        <div class="mb-3">
          <label class="form-label">Название *</label>
          <input type="text" name="title" class="form-control" required autofocus>
        </div>
        <div class="mb-3">
          <label class="form-label">Описание проблемы</label>
          <textarea name="description" class="form-control" rows="4" placeholder="Опишите проблему подробнее..."></textarea>
        </div>
        <div class="mb-3">
          <label class="form-label">Приоритет</label>
          <select name="priority" class="form-select">
            <option value="low">Низкий</option>
            <option value="medium" selected>Средний</option>
            <option value="high">Высокий</option>
            <option value="critical">Критический</option>
          </select>
        </div>
        <div class="mb-4">
          <label class="form-label">Оборудование</label>
          <select name="equipment_id" class="form-select">
            <option value="">— не выбрано —</option>
            {% for e in equipment_list %}
            <option value="{{ e.id }}">{{ e.name }}{% if e.inventory_number %} ({{ e.inventory_number }}){% endif %}{% if e.location %} — {{ e.location }}{% endif %}</option>
            {% endfor %}
          </select>
        </div>
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary">Создать заявку</button>
          <a href="/" class="btn btn-outline-secondary">Отмена</a>
        </div>
      </form>
    </div>
  </div>
</div>
</div>
{% endblock %}
